<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Cakes</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:#ffffff;
  color:#1a1a1a;
}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:linear-gradient(135deg,#1a0f0a,#2b1a12);
  padding:14px;
  z-index:1000;
}

nav .links{
  display:flex;
  gap:14px;
  justify-content:center;
}

nav a{
  color:#fff;
  text-decoration:none;
  font-size:13px;
  padding:8px 16px;
  border-radius:999px;
}

nav a:hover{
  background:#fff;
  color:#2b1a12;
}

/* CONTAINER */
.container{
  max-width:1400px;
  margin:auto;
  padding:30px 18px;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

/* FILTER BUTTON */
.filter-btn{
  border:none;
  background:#f3f3f3;
  padding:9px 18px;
  margin:5px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

.filter-btn.active,
.filter-btn:hover{
  background:#2b1a12;
  color:#fff;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:12px;
}

/* TEXT */
.card h4{
  margin:10px 0 5px;
  font-size:15px;
}

/* PRICE */
.price{
  font-size:22px;
  font-weight:800;
  margin:6px 0;
}

/* WEIGHT BOX */
.weight-box{
  background:#f2f2f2;
  padding:8px 12px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  color:#555;
  margin-bottom:6px;
}

/* LOCATION */
.location{
  font-size:12px;
  color:#888;
}

/* MOBILE */
@media(max-width:600px){
  .products{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<nav>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="regular.html">Regular</a>
    <a href="designer.html">Designer</a>
    <a href="wedding.html">Wedding</a>
    <a href="my-cakes.html">My Cakes</a> <!-- NEW -->
  </div>
</nav>

<div class="container">
<h2>Regular Cakes</h2>

<!-- FILTER -->
<div style="text-align:center;margin-bottom:20px;">
  <button class="filter-btn active" onclick="filterCake('all', this)">All</button>
  <button class="filter-btn" onclick="filterCake('chocolate', this)">Chocolate</button>
  <button class="filter-btn" onclick="filterCake('fruit', this)">Fruit</button>
</div>

<div class="products">

<!-- SAMPLE PRODUCTS (Add rest same way) -->

<div class="card">
  <img src="images/cake1.jpg">
  <h4>Kiwi Strawberry Glaze Cake</h4>
  <div class="price">₹400</div>
  <div class="weight-box">500gm</div>
  <div class="location">Aadesh Bakery • Jivraj Park</div>
</div>

<div class="card">
  <img src="images/cake2.jpg">
  <h4>Caramel Almond Crunch Cake</h4>
  <div class="price">₹430</div>
  <div class="weight-box">500gm</div>
  <div class="location">Aadesh Bakery • Jivraj Park</div>
</div>

<div class="card">
  <img src="images/cake3.jpg">
  <h4>White Chocolate Marble Cake</h4>
  <div class="price">₹420</div>
  <div class="weight-box">500gm</div>
  <div class="location">Aadesh Bakery • Jivraj Park</div>
</div>

</div>
</div>

<script>

/* FILTER FUNCTION */
function filterCake(category, btn){
  const cards = document.querySelectorAll('.card');

  document.querySelectorAll('.filter-btn')
    .forEach(b => b.classList.remove('active'));

  btn.classList.add('active');

  cards.forEach(card => {
    const name = card.querySelector('h4').innerText.toLowerCase();

    if(category === 'all'){
      card.style.display = 'block';
    }
    else if(name.includes(category)){
      card.style.display = 'block';
    }
    else{
      card.style.display = 'none';
    }
  });
}

</script>

</body>
</html>
