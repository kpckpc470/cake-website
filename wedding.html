<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Cakes</title>

<style>
/* SAME CSS AS REGULAR.HTML (no change) */
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#ffffff;color:#1a1a1a}

nav{position:sticky;top:0;background:linear-gradient(135deg,#1a0f0a,#2b1a12);padding:14px;z-index:1000}
nav .links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
nav a{color:#fff;text-decoration:none;font-size:13px;padding:8px 16px;border-radius:999px}

.container{max-width:1400px;margin:auto;padding:30px 18px}
h2{text-align:center;margin-bottom:20px}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px}

.card{background:#fff;border-radius:18px;padding:14px;box-shadow:0 6px 24px rgba(0,0,0,.06)}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:14px}

.price{font-weight:800;color:#2b1a12;font-size:18px}
.subtitle{font-size:12px;color:#666}
</style>
</head>

<body>

<nav>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="regular.html">Regular</a>
    <a href="wedding.html">Wedding</a>
  </div>
</nav>

<div class="container">
<h2>Wedding Cakes</h2>

<!-- FILTER (UPDATED FOR WEDDING) -->
<div style="text-align:center;margin-bottom:20px;">
  <button onclick="filterCake('all')">All</button>
  <button onclick="filterCake('tier')">Tier Cakes</button>
  <button onclick="filterCake('floral')">Floral</button>
  <button onclick="filterCake('royal')">Royal</button>
  <button onclick="filterCake('classic')">Classic</button>
</div>

<div class="products">

<!-- SAMPLE WEDDING PRODUCTS -->
<div class="card">
<img src="images/w1.jpg">
<h4>Royal White Tier Wedding Cake</h4>
<div class="price">₹3500</div>
<div class="subtitle">3 Tier</div>
</div>

<div class="card">
<img src="images/w2.jpg">
<h4>Floral Pink Wedding Cake</h4>
<div class="price">₹3200</div>
<div class="subtitle">2 Tier</div>
</div>

<div class="card">
<img src="images/w3.jpg">
<h4>Golden Royal Designer Cake</h4>
<div class="price">₹5000</div>
<div class="subtitle">3 Tier</div>
</div>

</div>
</div>

<script>
function filterCake(category){
  const cards = document.querySelectorAll('.card');

  cards.forEach(card=>{
    const name = card.innerText.toLowerCase();

    if(category === 'all' || name.includes(category)){
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });
}
</script>

</body>
</html>
