<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cakes</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial;background:#fff}

/* NAV */
nav{position:sticky;top:0;background:linear-gradient(#1a0f0a,#2b1a12);padding:14px}
nav .links{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
nav a{color:#fff;text-decoration:none;padding:8px 14px;border-radius:999px}
nav a:hover{background:#fff;color:#2b1a12}

/* GRID */
.container{max-width:1200px;margin:auto;padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}

/* CARD */
.card{background:#fff;border-radius:14px;padding:12px;box-shadow:0 4px 15px rgba(0,0,0,.08);position:relative}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:10px}

/* BADGE */
.card::before{
  content:attr(data-id);
  position:absolute;
  top:8px;left:8px;
  background:#000;color:#fff;
  font-size:10px;padding:4px 10px;border-radius:999px;
}

/* TEXT */
.price{font-weight:bold;color:#2b1a12;font-size:18px}

/* OPTIONS */
.options-row{display:flex;gap:6px;margin-top:6px}
select{flex:1;padding:6px;border-radius:6px}

/* WATERMARK */
.wm-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.wm-overlay span{
  color:rgba(0,0,0,0.15);
  transform:rotate(-18deg);
}
</style>
</head>

<body>

<nav>
<div class="links">
<a href="index.html">Home</a>
<a href="regular.html">Regular</a>
<a href="designer.html">Designer</a>
<a href="wedding.html">Wedding</a>
<a href="my-cakes.html">My Cakes</a>
</div>
</nav>

<div class="container">
<h2>My Cakes</h2>

<div class="products">

<!-- NORMAL CAKE -->
<div class="card" data-id="MY-001">
<img src="images/mycake1.jpg">
<h4>Custom Birthday Cake</h4>

<div class="price">₹<span class="price-value">1000</span></div>

<div class="options-row">
<select class="weight">
<option value="0.5">0.5kg</option>
<option value="1">1kg</option>
<option value="1.5">1.5kg</option>
<option value="2">2kg</option>
<option value="2.5">2.5kg</option>
<option value="3">3kg</option>
</select>

<select class="flavour">
<option>Black Forest</option>
<option>Chocolate</option>
<option>Pineapple</option>
<option>Strawberry</option>
<option>Red Velvet</option>
<option>Mango</option>
<option>Butterscotch</option>
<option>Blueberry</option>
</select>
</div>
</div>

<!-- WEDDING CAKE -->
<div class="card" data-id="MY-002">
<img src="images/mycake2.jpg">
<h4>Wedding Cake</h4>

<div class="price">₹<span class="price-value">1900</span></div>

<div class="options-row">
<select class="weight">
<option value="2">2kg</option>
<option value="2.5">2.5kg</option>
<option value="3">3kg</option>
</select>

<select class="flavour">
<option>Black Forest</option>
<option>Chocolate</option>
<option>Pineapple</option>
<option>Strawberry</option>
<option>Red Velvet</option>
<option>Mango</option>
<option>Butterscotch</option>
<option>Blueberry</option>
</select>
</div>
</div>

</div>
</div>

<script>

// BASE PRICES
const basePrices = {
  "Black Forest": 800,
  "Chocolate": 820,
  "Pineapple": 780,
  "Strawberry": 800,
  "Red Velvet": 900,
  "Mango": 850,
  "Butterscotch": 950,
  "Blueberry": 950
};

document.querySelectorAll('.card').forEach(card => {

  const baseCakePrice = parseInt(card.querySelector('.price-value').innerText);
  const weightSelect = card.querySelector('.weight');
  const flavourSelect = card.querySelector('.flavour');
  const priceText = card.querySelector('.price-value');

  function updatePrice(){

    const flavour = flavourSelect.value;
    const weight = parseFloat(weightSelect.value);

    let baseWeight = weightSelect.options[0].value == "2" ? 2 : 1;
    let oneKgPrice = baseWeight === 2 ? baseCakePrice / 2 : baseCakePrice;

    const diff = oneKgPrice - basePrices["Black Forest"];
    let flavourPrice = basePrices[flavour] + diff;

    let finalPrice;

    if(weight === 0.5){
      finalPrice = (flavourPrice / 2) + 50;
    }
    else if(weight === 1){
      finalPrice = flavourPrice;
    }
    else if(weight === 1.5){
      finalPrice = flavourPrice * 1.5;
    }
    else if(weight === 2){
      finalPrice = (flavourPrice * 2) - 100;
    }
    else if(weight === 2.5){
      finalPrice = (flavourPrice * 2.5) - 100;
    }
    else if(weight === 3){
      finalPrice = (flavourPrice * 3) - 100;
    }

    priceText.innerText = Math.round(finalPrice);
  }

  weightSelect.addEventListener('change', updatePrice);
  flavourSelect.addEventListener('change', updatePrice);

  // ✅ THIS LINE MAKES DEFAULT PRICE MINIMUM
  updatePrice();

});

// WATERMARK
document.querySelectorAll('.card').forEach(card => {
  const wm = document.createElement('div');
  wm.className = 'wm-overlay';
  wm.innerHTML = '<span>Aadesh Bakery • Jivraj Park</span>';
  card.appendChild(wm);
});

</script>

</body>
</html>
