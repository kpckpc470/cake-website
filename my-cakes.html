<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cakes</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial;background:#fff}

/* NAV */
nav{position:sticky;top:0;background:linear-gradient(#1a0f0a,#2b1a12);padding:14px}
nav .links{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
nav a{color:#fff;text-decoration:none;padding:8px 14px;border-radius:999px}
nav a:hover{background:#fff;color:#2b1a12}

/* GRID */
.container{max-width:1200px;margin:auto;padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}

/* CARD */
.card{background:#fff;border-radius:14px;padding:12px;box-shadow:0 4px 15px rgba(0,0,0,.08);position:relative}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:10px}

/* BADGE */
.card::before{
  content:attr(data-id);
  position:absolute;
  top:8px;left:8px;
  background:#000;color:#fff;
  font-size:10px;padding:4px 10px;border-radius:999px;
}

/* TEXT */
.price{font-weight:bold;color:#2b1a12;font-size:18px}

/* OPTIONS */
.options-row{display:flex;gap:6px;margin-top:6px}
select{flex:1;padding:6px;border-radius:6px}

/* WATERMARK */
.wm-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.wm-overlay span{
  color:rgba(0,0,0,0.15);
  transform:rotate(-18deg);
}
</style>
</head>

<body>

<nav>
<div class="links">
<a href="index.html">Home</a>
<a href="regular.html">Regular</a>
<a href="designer.html">Designer</a>
<a href="wedding.html">Wedding</a>
<a href="my-cakes.html">My Cakes</a>
</div>
</nav>

<div class="container">
<h2>My Cakes</h2>

<div class="products" id="products"></div>
</div>

<script>

/* FLAVOURS */
const flavourList = [
"Pineapple","Strawberry","Mango","Orange","White Forest","Black Forest",
"Black Current","Classic Black Forest","Raspberry","Mix Fruit","Blueberry",
"German Forest","Kiwi Strawberry","Choco-Vanilla","Caramal","Butterscotch",
"Belgium Chocolate","Choco-Oreo","Tiramisu","Choco-Delight","Choco-Chips",
"Coffee","Choco-Mousse","Dark-Mousse","Choco-Duet Mousse","Green Apple",
"Chocolate Praline","Rose Pista","Kesar Badam","Choco-Orange","Milk-Choco",
"Hazelnut","Choco-Ball","Ferrero Rocher","KitKat & Jems","Rasmalai",
"Choco-Caramal","Choco-Almond","Red Velvet","Choco-Fudge","Dutch Truffle",
"German Chocolate"
];

const basePrices = {
"Pineapple":800,"Strawberry":800,"Mango":800,"Orange":840,"White Forest":820,"Black Forest":820,
"Black Current":760,"Classic Black Forest":860,"Raspberry":900,"Mix Fruit":840,"Blueberry":820,
"German Forest":840,"Kiwi Strawberry":800,"Choco-Vanilla":820,"Caramal":850,"Butterscotch":830,
"Belgium Chocolate":1200,"Choco-Oreo":920,"Tiramisu":920,"Choco-Delight":870,"Choco-Chips":850,
"Coffee":900,"Choco-Mousse":850,"Dark-Mousse":850,"Choco-Duet Mousse":860,"Green Apple":800,
"Chocolate Praline":880,"Rose Pista":860,"Kesar Badam":860,"Choco-Orange":880,"Milk-Choco":880,
"Hazelnut":940,"Choco-Ball":900,"Ferrero Rocher":1200,"KitKat & Jems":1100,"Rasmalai":900,
"Choco-Caramal":920,"Choco-Almond":880,"Red Velvet":950,"Choco-Fudge":920,"Dutch Truffle":950,
"German Chocolate":850
};

/* LOAD PRODUCTS FROM JSON */
fetch('mycakes.json')
.then(res => res.json())
.then(data => {

  const container = document.getElementById('products');

  data.forEach((cake, i) => {

    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('data-id', 'MY-' + String(i+1).padStart(3,'0'));

    card.innerHTML = `
      <img src="${cake.image}">
      <h4>${cake.name}</h4>

      <div class="price">₹<span class="price-value">${cake.price}</span></div>

      <div class="options-row">
        <select class="weight">
          ${generateWeights(cake.minWeight)}
        </select>

        <select class="flavour"></select>
      </div>

      <div style="font-size:11px;color:#888;">
        Min: ${cake.minWeight}kg
      </div>
    `;

    container.appendChild(card);
  });

  insertFlavours();
  setupPricing();
  addWatermark();

});

/* GENERATE WEIGHTS */
function generateWeights(min){
  let weights = [0.5,1,1.5,2,2.5,3];
  return weights
    .filter(w => w >= min)
    .map(w => `<option value="${w}">${w}kg</option>`)
    .join('');
}

/* INSERT FLAVOURS */
function insertFlavours(){
  document.querySelectorAll('.flavour').forEach(select => {
    flavourList.forEach(f => {
      const opt = document.createElement('option');
      opt.textContent = f;
      select.appendChild(opt);
    });
  });
}

/* PRICING */
function setupPricing(){

document.querySelectorAll('.card').forEach(card => {

  const baseCakePrice = parseInt(card.querySelector('.price-value').innerText);
  const weightSelect = card.querySelector('.weight');
  const flavourSelect = card.querySelector('.flavour');
  const priceText = card.querySelector('.price-value');

function updatePrice(){

  const flavour = flavourSelect.value;
  const weight = parseFloat(weightSelect.value);

  // 1️⃣ Base 1KG price from card
  let oneKgPrice = baseCakePrice;

  // 2️⃣ Adjust price based on flavour
  const diff = oneKgPrice - basePrices["Pineapple"];
  let flavourPrice = basePrices[flavour] + diff;
     

  // 3️⃣ Apply your custom weight formula
  let finalPrice;

  if(weight === 0.5){
    finalPrice = (flavourPrice / 2) + 50;
  }
  else if(weight === 1){
    finalPrice = flavourPrice;
  }
  else if(weight === 1.5){
    finalPrice = flavourPrice * 1.5;
  }
  else if(weight === 2){
    finalPrice = (flavourPrice * 2) - 100;
  }
  else if(weight === 2.5){
    finalPrice = (flavourPrice * 2.5) - 100;
  }
  else if(weight === 3){
    finalPrice = (flavourPrice * 3) - 100;
  }

  priceText.innerText = Math.round(finalPrice);
}
  weightSelect.addEventListener('change', updatePrice);
  flavourSelect.addEventListener('change', updatePrice);

  updatePrice();
});
}

/* WATERMARK */
function addWatermark(){
document.querySelectorAll('.card').forEach(card => {
  const wm = document.createElement('div');
  wm.className = 'wm-overlay';
  wm.innerHTML = '<span>Aadesh Bakery • Jivraj Park</span>';
  card.appendChild(wm);
});
}

</script>

</body>
</html>
