<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cakes</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#fff;color:#1a1a1a}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:linear-gradient(135deg,#1a0f0a,#2b1a12);
  padding:14px;
  z-index:1000;
}
nav .links{
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
}
nav a{
  color:#fff;
  text-decoration:none;
  font-size:13px;
  padding:8px 16px;
  border-radius:999px;
}
nav a:hover{
  background:#fff;
  color:#2b1a12;
}

/* CONTAINER */
.container{
  max-width:1400px;
  margin:auto;
  padding:30px 18px;
}
h2{text-align:center;margin-bottom:25px}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  box-shadow:0 6px 24px rgba(0,0,0,.06);
  position:relative;
  overflow:hidden;
}
.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:14px;
}

/* BADGE */
.card::before{
  content:attr(data-id);
  position:absolute;
  top:10px;
  left:10px;
  background:#2b1a12;
  color:#fff;
  font-size:11px;
  padding:5px 12px;
  border-radius:999px;
}

/* TEXT */
.card h4{margin:10px 0 6px;font-size:15px}
.price{font-weight:800;color:#2b1a12;font-size:18px}

/* OPTIONS */
.options-row{
  display:flex;
  gap:10px;
  margin-top:8px;
}
.select-box{
  flex:1;
  padding:6px;
  border-radius:8px;
  border:1px solid #eee;
}

/* WATERMARK */
.wm-overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
.wm-overlay span{
  font-size:14px;
  color:rgba(0,0,0,0.15);
  transform:rotate(-18deg);
}
</style>
</head>

<body>

<nav>
<div class="links">
<a href="index.html">Home</a>
<a href="regular.html">Regular</a>
<a href="designer.html">Designer</a>
<a href="wedding.html">Wedding</a>
<a href="my-cakes.html">My Cakes</a>
</div>
</nav>

<div class="container">
<h2>My Cakes</h2>

<div class="products">

<!-- PRODUCT -->
<div class="card" data-id="MY-001">
<img src="images/mycake1.jpg">
<h4>Custom Birthday Cake</h4>

<div class="price">₹<span class="price-value">1000</span></div>

<div class="options-row">
<select class="select-box weight">
<option value="1">1kg</option>
<option value="1.5">1.5kg</option>
<option value="2">2kg</option>
<option value="2.5">2.5kg</option>
<option value="3">3kg</option>
</select>

<select class="select-box flavour">
<option>Black Forest</option>
<option>Chocolate</option>
<option>Pineapple</option>
<option>Strawberry</option>
<option>Red Velvet</option>
<option>Mango</option>
<option>Butterscotch</option>
<option>Blueberry</option>
</select>
</div>

<div style="font-size:11px;color:#999;margin-top:4px;">
Aadesh Bakery • Jivraj Park
</div>
</div>

</div>
</div>

<script>

// BASE PRICES
const basePrices = {
  "Black Forest": 800,
  "Chocolate": 820,
  "Pineapple": 780,
  "Strawberry": 800,
  "Red Velvet": 900,
  "Mango": 850,
  "Butterscotch": 950,
  "Blueberry": 950
};

document.querySelectorAll('.card').forEach(card => {

  const baseCakePrice = parseInt(card.querySelector('.price-value').innerText);
  const weightSelect = card.querySelector('.weight');
  const flavourSelect = card.querySelector('.flavour');
  const priceText = card.querySelector('.price-value');

  function updatePrice(){

    const flavour = flavourSelect.value;
    const weight = parseFloat(weightSelect.value);

    const diff = baseCakePrice - basePrices["Black Forest"];
    let flavourPrice = basePrices[flavour] + diff;

    let finalPrice;

    if(weight === 1){
      finalPrice = flavourPrice;
    }
    else if(weight === 1.5){
      finalPrice = flavourPrice * 1.5;
    }
    else if(weight === 2){
      finalPrice = (flavourPrice * 2) - 100;
    }
    else if(weight === 2.5){
      finalPrice = (flavourPrice * 2.5) - 100;
    }
    else if(weight === 3){
      finalPrice = (flavourPrice * 3) - 100;
    }

    priceText.innerText = Math.round(finalPrice);
  }

  weightSelect.addEventListener('change', updatePrice);
  flavourSelect.addEventListener('change', updatePrice);

});

// WATERMARK
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.card').forEach(card => {
    const wm = document.createElement('div');
    wm.className = 'wm-overlay';
    wm.innerHTML = '<span>Aadesh Bakery • Jivraj Park</span>';
    card.appendChild(wm);
  });
});

</script>

</body>
</html>
