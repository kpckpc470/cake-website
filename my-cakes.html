<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cakes</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#fff;color:#1a1a1a}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:linear-gradient(135deg,#1a0f0a,#2b1a12);
  padding:14px;
  z-index:1000;
}
nav .links{
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
}
nav a{
  color:#fff;
  text-decoration:none;
  font-size:13px;
  padding:8px 16px;
  border-radius:999px;
}
nav a:hover{
  background:#fff;
  color:#2b1a12;
}

.container{max-width:1200px;margin:auto;padding:30px 15px}
h2{text-align:center;margin-bottom:25px}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:12px;
  box-shadow:0 6px 20px rgba(0,0,0,.08);
  transition:.3s;
}
.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:12px;
}

.card h4{
  margin:10px 0 5px;
  font-size:15px;
}

.price{
  font-weight:700;
  color:#2b1a12;
}

.subtitle{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<nav>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="regular.html">Regular</a>
    <a href="designer.html">Designer</a>
    <a href="wedding.html">Wedding</a>
    <a href="my-cakes.html">My Cakes</a>
  </div>
</nav>

<div class="container">
  <h2>My Cakes</h2>

  <div class="products">

    <!-- ADD YOUR CUSTOM CAKES HERE -->

    <div class="card">
      <img src="images/mycake1.jpg">
      <h4>Custom Birthday Cake</h4>
      <div class="price">₹600</div>
      <div class="subtitle">1kg</div>
    </div>

    <div class="card">
      <img src="images/mycake2.jpg">
      <h4>Photo Printed Cake</h4>
      <div class="price">₹750</div>
      <div class="subtitle">1kg</div>
    </div>

    <div class="card">
      <img src="images/mycake3.jpg">
      <h4>Theme Designer Cake</h4>
      <div class="price">₹1200</div>
      <div class="subtitle">2kg</div>
    </div>

  </div>
</div>

</body>
</html>
