<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cakes</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:#ffffff;color:#1a1a1a}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:linear-gradient(135deg,#1a0f0a,#2b1a12);
  padding:14px;
  z-index:1000;
  box-shadow:0 6px 25px rgba(0,0,0,.3);
}

nav .links{
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
}

nav a{
  color:#fff;
  text-decoration:none;
  font-size:13px;
  padding:8px 16px;
  border-radius:999px;
  transition:.3s;
}

nav a:hover{
  background:#fff;
  color:#2b1a12;
}

/* CONTAINER */
.container{
  max-width:1400px;
  margin:auto;
  padding:30px 18px;
}

h2{
  text-align:center;
  margin-bottom:25px;
  font-weight:800;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  box-shadow:0 6px 24px rgba(0,0,0,.06);
  transition:.35s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 16px 40px rgba(0,0,0,.12);
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:14px;
  transition:.4s;
}

.card:hover img{
  transform:scale(1.08);
}

/* BADGE */
.card::before{
  content:attr(data-id);
  position:absolute;
  top:10px;
  left:10px;
  background:#2b1a12;
  color:#fff;
  font-size:11px;
  padding:5px 12px;
  border-radius:999px;
}

/* TEXT */
.card h4{
  margin:10px 0 6px;
  font-size:15px;
  font-weight:700;
}

.price{
  font-weight:800;
  color:#2b1a12;
  font-size:18px;
}

/* DROPDOWN */
.weight-select{
  margin-top:6px;
  padding:6px 10px;
  border-radius:8px;
  border:1px solid #eee;
  background:#fff;
  font-size:12px;
  font-weight:600;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  cursor:pointer;
}

.weight-select:hover{
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}

/* WATERMARK */
.card .wm-overlay{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
.card .wm-overlay span{
  font-size:14px;
  letter-spacing:2px;
  color:rgba(43,26,18,0.15);
  transform:rotate(-18deg);
}

/* MOBILE */
@media(max-width:600px){
  .products{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:400px){
  .products{grid-template-columns:1fr}
}
</style>
</head>

<body>

<nav>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="regular.html">Regular</a>
    <a href="designer.html">Designer</a>
    <a href="wedding.html">Wedding</a>
    <a href="my-cakes.html">My Cakes</a>
  </div>
</nav>

<div class="container">
  <h2>My Cakes</h2>

  <div class="products">

    <!-- PRODUCT 1 -->
    <div class="card" data-id="MY-001">
      <img src="images/mycake1.jpg">
      <h4>Custom Birthday Cake</h4>
      <div class="price">₹600 (1kg)</div>

      <select class="weight-select">
        <option>1kg</option>
        <option>1.5kg</option>
        <option>2kg</option>
        <option>2.5kg</option>
        <option>3kg</option>
      </select>

      <div style="font-size:11px;color:#999;margin-top:4px;">
        Aadesh Bakery • Jivraj Park
      </div>
    </div>

    <!-- PRODUCT 2 -->
    <div class="card" data-id="MY-002">
      <img src="images/mycake2.jpg">
      <h4>Photo Printed Cake</h4>
      <div class="price">₹750 (1kg)</div>

      <select class="weight-select">
        <option>1kg</option>
        <option>1.5kg</option>
        <option>2kg</option>
        <option>2.5kg</option>
        <option>3kg</option>
      </select>

      <div style="font-size:11px;color:#999;margin-top:4px;">
        Aadesh Bakery • Jivraj Park
      </div>
    </div>

    <!-- PRODUCT 3 -->
    <div class="card" data-id="MY-003">
      <img src="images/mycake3.jpg">
      <h4>Theme Designer Cake</h4>
      <div class="price">₹1200 (1kg)</div>

      <select class="weight-select">
        <option>1kg</option>
        <option>1.5kg</option>
        <option>2kg</option>
        <option>2.5kg</option>
        <option>3kg</option>
      </select>

      <div style="font-size:11px;color:#999;margin-top:4px;">
        Aadesh Bakery • Jivraj Park
      </div>
    </div>

  </div>
</div>

<script>

// WATERMARK AUTO ADD
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.card').forEach(card => {
    if(!card.querySelector('.wm-overlay')){
      const wm = document.createElement('div');
      wm.className = 'wm-overlay';
      wm.innerHTML = '<span>Aadesh Bakery • Jivraj Park</span>';
      card.appendChild(wm);
    }
  });
});

</script>

</body>
</html>
